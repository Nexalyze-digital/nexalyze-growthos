version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: growthos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: growthos
      POSTGRES_PASSWORD: growthos
      POSTGRES_DB: growthos
    ports:
      - "5432:5432"
    volumes:
      - growthos_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: growthos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  growthos_postgres_data:
