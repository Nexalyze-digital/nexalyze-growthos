name: Playwright Smoke

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///data/ci-growthos.db
      JWT_SECRET_KEY: ci-test-secret-key-for-growthos
      AI_PROVIDER: mock
      AI_FALLBACK_PROVIDER: mock
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install chromium

      - name: Backend tests
        working-directory: apps/api
        run: python -m pytest tests

      - name: Frontend lint
        working-directory: apps/web
        run: npm run lint

      - name: Frontend build
        working-directory: apps/web
        run: npm run build

      - name: Start API
        working-directory: apps/api
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://localhost:8000/health && exit 0
            sleep 1
          done
          cat api.log
          exit 1

      - name: Start web
        working-directory: apps/web
        run: |
          nohup npm run dev > web.log 2>&1 &
          for i in {1..60}; do
            curl -fsS http://localhost:3000 && exit 0
            sleep 1
          done
          cat web.log
          exit 1

      - name: Playwright smoke
        working-directory: apps/web
        run: node tests/research-hub-smoke.mjs
